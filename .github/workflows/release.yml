name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-14
            arch: aarch64
            platform: apple-darwin
          - os: macos-15
            arch: x86_64
            platform: apple-darwin
          - os: ubuntu-latest
            arch: x86_64
            platform: unknown-linux-gnu
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          pip install pyinstaller
          pip install -e .

      - name: Build binary
        run: pyinstaller glmon.spec

      - name: Rename binary
        run: mv dist/glmon dist/glmon-${{ matrix.arch }}-${{ matrix.platform }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: glmon-${{ matrix.arch }}-${{ matrix.platform }}
          path: dist/glmon-${{ matrix.arch }}-${{ matrix.platform }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
