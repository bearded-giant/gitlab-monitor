name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          pip install 'pyinstaller>=6.10'
          pip install -e .

      - name: Build binary
        env:
          PYINSTALLER_TARGET_ARCH: arm64
        run: pyinstaller glmon.spec

      - name: Verify binary arch
        run: |
          file dist/glmon/glmon
          file dist/glmon/glmon | grep -q 'arm64'

      - name: Smoke test binary
        run: |
          set +e
          ( cd dist/glmon && ./glmon ) > smoke.out 2>&1 &
          pid=$!
          ( sleep 10; kill $pid 2>/dev/null ) &
          guard=$!
          wait $pid
          status=$?
          kill $guard 2>/dev/null || true
          set -e
          cat smoke.out
          if [ "$status" -eq 143 ]; then
            echo "binary hung for 10s (killed)" >&2
            exit 1
          fi
          grep -q 'GITLAB_URL' smoke.out

      - name: Package binary
        run: tar -czf dist/glmon-aarch64-apple-darwin.tar.gz -C dist/glmon .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: glmon-aarch64-apple-darwin
          path: dist/glmon-aarch64-apple-darwin.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/glmon-*
          generate_release_notes: true
